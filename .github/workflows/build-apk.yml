name: Build Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install root dependencies
        run: npm install --prefer-offline --no-audit

      - name: Install mobile dependencies
        run: |
          cd mobile
          npm install --prefer-offline --no-audit

      - name: Setup Expo
        run: npm install -g expo-cli eas-cli

      - name: Prebuild for Android
        run: |
          cd mobile
          npx expo prebuild --platform android --clean

      - name: Build Release APK
        run: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK to Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: mobile/android/app/build/outputs/apk/release/app-release.apk
          tag_name: release-${{ github.run_number }}
          release_name: Release APK - Build ${{ github.run_number }}
          body: |
            ## Production APK Build Successful! 🎉
            
            **Build Details:**
            - Build Number: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
            
            **Installation:**
            ```bash
            adb install app-release.apk
            ```
            
            **API Endpoint:** https://psychologistai.mi-emaehf.workers.dev
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
