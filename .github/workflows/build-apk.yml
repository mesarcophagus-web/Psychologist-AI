name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Dependencies
        run: |
          # Remove expo packages causing errors
          npm pkg delete dependencies.expo-build-properties 2>/dev/null || true
          npm pkg delete devDependencies.expo-build-properties 2>/dev/null || true
          npm pkg delete dependencies.expo 2>/dev/null || true
          
          # Clean install
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          ./gradlew assembleRelease
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk