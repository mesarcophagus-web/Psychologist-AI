name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        working-directory: mobile
        run: npm install

      - name: Expo Prebuild (generates Android project)
        working-directory: mobile
        run: npx expo prebuild --platform android --clean

      - name: Make Gradlew executable
        run: chmod +x mobile/android/gradlew

      - name: Build Debug APK with retry
        working-directory: mobile/android
        run: |
          for i in {1..3}; do
            echo "Build attempt $i..."
            if ./gradlew assembleDebug --no-daemon; then
              echo "Build succeeded!"
              exit 0
            fi
            echo "Build attempt $i failed, waiting before retry..."
            sleep 15
          done
          echo "All build attempts failed."
          exit 1

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: psychologist-ai-debug
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "APK Build #${{ github.run_number }}"
          body: |
            Auto-built debug APK from commit ${{ github.sha }}
            Download and install on any Android device.
          files: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}