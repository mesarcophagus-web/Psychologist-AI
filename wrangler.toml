name = "psychologist-ai"
type = "javascript"
account_id = ""
workers_dev = true
route = ""
zone_id = ""
compatibility_date = "2024-01-15"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "psychologist-ai-prod"
route = "example.com/*"
zone_id = ""

[build]
command = "npm install"
cwd = "./functions"

[build.upload]
format = "modules"
main = "./index.js"

[observability]
enabled = true

[[r2_buckets]]
binding = "CHAT_HISTORY"
bucket_name = "psychologist-chat-history"